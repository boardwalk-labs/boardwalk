# Publish to npm with provenance on a version tag (v0.1.0 -> @boardwalk-labs/engine@0.1.0).
# Auth: npm Trusted Publishing via GitHub OIDC (no stored token). Configure the trusted publisher
# for @boardwalk-labs/engine on npmjs.com: org boardwalk-labs, repo boardwalk-labs/boardwalk,
# workflow .github/workflows/release.yml.
#
# Like the CLI, the engine consumes @boardwalk-labs/workflow; the link: override must be removed
# (cut over to the npm SDK) before a release. The guard step enforces it.
#
# The Docker image (ghcr.io/boardwalk-labs/boardwalk) publishes from a separate workflow
# (docker.yml) — GHCR auth is GITHUB_TOKEN-based, so it stays decoupled from this npm release.

name: Release

on:
  push:
    tags: ["v*"]

env:
  # Run JS actions on Node 24 now (GitHub forces this 2026-06-16); a no-op once it is the default.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # npm --provenance (Trusted Publishing)
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - name: "No link: overrides in a release"
        run: |
          if node -p "JSON.stringify(require('./package.json').pnpm?.overrides ?? {})" | grep -q "link:"; then
            echo "package.json still has a link: override; remove it and lock against the registry first" >&2
            exit 1
          fi
      - run: pnpm install --frozen-lockfile
      - name: Tag must match package.json version
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "tag $GITHUB_REF_NAME != package.json $PKG_VERSION" >&2
            exit 1
          fi
      - run: pnpm format:check
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      # Trusted Publishing needs a recent npm (>= 11.5.1); node 24's bundled npm may be older. Pin
      # to the 11.x line: npm 12 ships a broken provenance path (`Cannot find module 'sigstore'`), so
      # `npm@latest` (now 12.x) fails to publish. Stay on 11.x until 12's sigstore break is fixed.
      - run: npm install -g npm@^11.5.1
      # A prerelease version (anything with a `-`) publishes under the `next` dist-tag so
      # `latest` keeps pointing at the current stable line for plain installs.
      - name: Publish (prereleases under --tag next)
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          case "$PKG_VERSION" in
            *-*) npm publish --provenance --access public --tag next ;;
            *)   npm publish --provenance --access public ;;
          esac
