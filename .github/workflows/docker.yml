# Publish the flagship engine image to GHCR: ghcr.io/boardwalk-labs/boardwalk.
#
# Decoupled from the npm release (release.yml) on purpose: GHCR authenticates with the workflow's
# GITHUB_TOKEN (no trusted-publisher/account setup), and keeping it separate means a Docker publish
# never tries to republish the npm package. Runs on every version tag, and on demand
# (workflow_dispatch) — the image version is read from package.json, so a manual run publishes the
# current version + :latest without a new tag.

name: Docker

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  publish-docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # push to GHCR
      id-token: write # build provenance
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Resolve image version from package.json
        id: meta
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"
      - name: Build and push (with provenance)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/boardwalk:${{ steps.meta.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/boardwalk:latest
          provenance: true
      - name: Smoke-test the pushed image (boots + serves)
        run: |
          IMAGE="ghcr.io/${{ github.repository_owner }}/boardwalk:${{ steps.meta.outputs.version }}"
          docker run -d --name bw -p 8080:8080 "$IMAGE"
          for i in $(seq 1 15); do
            if curl -fsS -o /dev/null http://localhost:8080/; then echo "server is up"; exit 0; fi
            sleep 1
          done
          echo "image did not serve in time" >&2
          docker logs bw >&2 || true
          exit 1
